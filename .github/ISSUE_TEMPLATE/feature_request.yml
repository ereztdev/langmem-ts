name: Feature request
description: Propose a new capability or interface addition
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check the [roadmap](https://github.com/ereztdev/langmem-ts#roadmap) — your idea may already be tracked. If it touches an existing interface (`Embedder`, `Store`, `Retriever`, `Extractor`), please open an issue *before* starting a PR.

  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that langmem-ts currently makes hard or impossible?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        Sketch the API or change you'd want. TypeScript snippets are ideal.
        If this adds or modifies an interface, show the interface shape.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you thought about solving this, including staying with the status quo.

  - type: dropdown
    id: scope
    attributes:
      label: Scope estimate
      description: Roughly how big is this?
      options:
        - Small (single file, no interface change)
        - Medium (single feature, may touch an interface)
        - Large (new backend, cross-cutting, or new interface)
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: Are you willing to work on this?
      options:
        - label: I'd like to submit a PR for this
        - label: I can help review or test
        - label: I'm reporting the need; someone else should implement it
