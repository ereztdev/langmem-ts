services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: langmem
      POSTGRES_PASSWORD: langmem
      POSTGRES_DB: langmem
    ports:
      - "5432:5432"
    volumes:
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
      - langmem_pgdata:/var/lib/postgresql/data

volumes:
  langmem_pgdata:
